spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/exchange_dev?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}

logging:
  level:
    root: INFO
    com.exchange: DEBUG
    org.springframework.web: INFO
    com.baomidou.mybatisplus: INFO
